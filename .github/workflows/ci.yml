name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore PrintMaestro.slnx

      - name: Build
        run: dotnet build PrintMaestro.slnx -c Release --no-restore

      - name: Test
        run: dotnet test PrintMaestro.slnx -c Release --no-build --verbosity normal
