name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build and test
        run: |
          dotnet restore PrintMaestro.slnx
          dotnet test PrintMaestro.slnx -c Release --verbosity normal

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build release packages
        shell: pwsh
        run: ./scripts/build-release.ps1 -Configuration Release

      - name: Publish MSIX (optional)
        shell: pwsh
        continue-on-error: true
        run: ./scripts/publish-msix.ps1 -Configuration Release

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PrintMaestro-*-Setup.exe
            dist/PrintMaestro-*-Setup.exe.sha256
            dist/PrintMaestro-*-win-x64.zip
            dist/PrintMaestro-*-win-x64.zip.sha256
            dist/PrintMaestro-*.msix
          generate_release_notes: true
