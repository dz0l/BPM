name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build and test
        run: |
          dotnet restore PrintMaestro.slnx
          dotnet test PrintMaestro.slnx -c Release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Publish portable ZIP and beta Setup.exe
        shell: pwsh
        run: ./scripts/publish-inno.ps1 -Configuration Release

      - name: Publish MSIX
        shell: pwsh
        continue-on-error: true
        run: ./scripts/publish-msix.ps1 -Configuration Release

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PrintMaestro-*-Setup.exe
            dist/PrintMaestro-*.zip
            dist/PrintMaestro-*.msix
          generate_release_notes: true
